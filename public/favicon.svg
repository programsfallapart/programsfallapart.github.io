<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Programs Fall Apart">
  <style>
    /* Match the wordmark: "programs" ink, "fall apart" a step dimmer.
       Adapts to the OS theme like the logo does. */
    .ink { fill: #181c21; }
    .dim { fill: #6b7280; }
    @media (prefers-color-scheme: dark) {
      .ink { fill: #e6edf3; }
      .dim { fill: #8b949e; }
    }
  </style>
  <rect class="ink" x="6" y="10" width="20" height="4" rx="1.6"/>
  <rect class="dim" x="6" y="18" width="13" height="4" rx="1.6"/>
</svg>
